<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odontología Profesional</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">
            <i class="fa-solid fa-tooth"></i>
            <span id="clinica-nombre-nav">OdontoSana</span>
        </div>
        <ul class="nav-links">
            <li><a href="#inicio">La Clínica</a></li>
            <li><a href="#servicios">Tratamientos</a></li>
            <li><a href="#contacto">Contacto</a></li>
        </ul>
        <div class="nav-cta">
            <a id="nav-phone" href="tel:+50499999999" class="btn-outline">9999-9999</a>
            <a href="#contacto" class="btn-primary">Pedir Cita</a>
        </div>
    </nav>

    <header id="inicio" class="hero-split">
        <div class="hero-content">
            <h1 id="clinica-slogan"></h1>
            <p id="clinica-sobre-nosotros"></p>
            <a href="#servicios" class="btn-primary-large">Conócenos</a>
        </div>
        <div class="hero-image-placeholder"></div>
    </header>

    <section id="servicios" class="seccion-servicios">
        <div id="lista-servicios" class="grid-tratamientos"></div>
    </section>

    <footer id="contacto" class="footer">
        <h3>Contacto y Citas</h3>
        <p>Dirección: <span id="contacto-direccion"></span></p>
        <a id="contacto-whatsapp" href="#" target="_blank">
            <i class="fa-brands fa-whatsapp"></i> Agendar por WhatsApp
        </a>
    </footer>

    <script src="app.js"></script>
</body>
</html>
